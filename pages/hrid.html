<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Грід — Ігор Матрофайло</title>
<style>
  :root {
    --ivory:  #FAF9F5; --paper: #FFFFFF; --slate: #141413; --oat: #E3DACC;
    --clay:   #D97757; --clay-d: #B85C3E; --clay-l: #FDF0EB;
    --olive:  #788C5D; --olive-l: #EEF3E8;
    --blue:   #4A7CC7; --blue-l: #EEF3FC;
    --g100: #F0EEE6; --g200: #E6E3DA; --g300: #D1CFC5; --g500: #87867F; --g700: #3D3D3A;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--ivory); color: var(--slate); line-height: 1.55; min-height: 100vh; }

  .page-header { max-width: 1100px; margin: 0 auto; padding: 36px 52px 28px; border-bottom: 1.5px solid var(--oat); }
  .page-eyebrow { font-family: var(--mono); font-size: 11px; color: var(--clay); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .page-header h1 { font-family: var(--serif); font-size: clamp(28px, 4vw, 48px); font-weight: 500; line-height: 1.1; }
  .page-header p  { margin-top: 10px; font-size: 15px; color: var(--g500); max-width: 500px; }

  .content { max-width: 1100px; margin: 0 auto; padding: 36px 52px 60px; }

  .chart-section { background: var(--paper); border: 1.5px solid var(--g300); border-radius: 16px; overflow: hidden; }
  .chart-head { padding: 20px 24px 16px; border-bottom: 1.5px solid var(--g200); }
  .chart-head h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .chart-head p  { font-size: 12.5px; color: var(--g500); }
  .chart-body { padding: 24px; }

  #tooltip { position: fixed; background: var(--slate); color: white; padding: 8px 13px; border-radius: 8px; font-size: 12.5px; pointer-events: none; display: none; z-index: 1000; max-width: 280px; line-height: 1.4; }
  #tooltip strong { display: block; font-size: 13px; margin-bottom: 2px; }
  #tooltip span { color: #ccc; font-size: 11.5px; }
  #tooltip em { color: #aaa; font-size: 11px; font-style: normal; display: block; margin-top: 2px; }

  .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--g500); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  #waffle { display: flex; flex-wrap: wrap; gap: 3px; line-height: 0; }
  .wsq {
    width: 12px; height: 12px; border-radius: 2px; cursor: pointer;
    transition: transform 0.08s; flex-shrink: 0;
  }
  .wsq:hover { transform: scale(1.5); z-index: 10; position: relative; }
  .wsq.yt { opacity: 0.6; }

  .loading { display: flex; align-items: center; justify-content: center; height: 200px; font-family: var(--mono); font-size: 13px; color: var(--g500); }

  footer { max-width: 1100px; margin: 0 auto; padding: 20px 52px 36px; border-top: 1.5px solid var(--g300); font-size: 12px; color: var(--g500); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  footer a { color: var(--clay); text-decoration: none; }

  @media (max-width: 768px) {
    .page-header, .content, footer { padding-left: 20px; padding-right: 20px; }
    .page-header { padding-top: 24px; }
    .chart-body { padding: 16px; }
    .wsq { width: 9px; height: 9px; }
  }
</style>
</head>
<body>

<div id="tooltip"><strong id="tt-name"></strong><span id="tt-count"></span><em id="tt-src"></em></div>

<header class="page-header">
  <div class="page-eyebrow">Грід</div>
  <h1>Кожен квадрат — пост</h1>
  <p>Всі матеріали згруповані за темою. Наведи для назви, клікни щоб відкрити.</p>
</header>

<main class="content">
  <section class="chart-section">
    <div class="chart-head">
      <h2>Waffle</h2>
      <p>Кожен квадрат = 1 матеріал, згрупований за темою і компанією.</p>
    </div>
    <div class="chart-body">
      <div id="waffle"></div>
      <div class="loading" id="waffle-loading">Завантаження…</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--clay)"></div>Компанії</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--olive)"></div>Теми</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Продукти</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--g300)"></div>YouTube (менша насиченість)</div>
      </div>
    </div>
  </section>
</main>

<footer>
  <span>Ігор Матрофайло · <a href="https://t.me/imatrofAI" target="_blank">@imatrofAI</a></span>
  <span>Дані: 2024–2026</span>
</footer>

<script>
'use strict';

const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttCount = document.getElementById('tt-count');
const ttSrc   = document.getElementById('tt-src');

function showTip(e, name, count, src) {
  tooltip.style.display = 'block';
  tooltip.style.left    = (e.clientX + 14) + 'px';
  tooltip.style.top     = (e.clientY - 10) + 'px';
  ttName.textContent    = name;
  ttCount.textContent   = count;
  ttSrc.textContent     = src || '';
}
function hideTip() { tooltip.style.display = 'none'; }

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderWaffle(topics) {
  const container = document.getElementById('waffle');
  container.innerHTML = '';

  const order = ['topic', 'company', 'product'];
  const sorted = [...topics].sort((a, b) => {
    const ai = order.indexOf(a.category), bi = order.indexOf(b.category);
    if (ai !== bi) return ai - bi;
    return b.count - a.count;
  });

  const frag = document.createDocumentFragment();

  for (const t of sorted) {
    if (!t.posts || !t.posts.length) continue;

    for (const p of t.posts) {
      const el = document.createElement(p.url ? 'a' : 'div');
      el.className = 'wsq' + (p.url && p.url.includes('youtube') ? ' yt' : '');
      el.style.background  = hexAlpha(t.color, p.url && p.url.includes('youtube') ? 0.5 : 0.8);
      el.style.borderColor = hexAlpha(t.color, 0.3);
      if (p.url) { el.href = p.url; el.target = '_blank'; el.rel = 'noopener'; }

      el.addEventListener('mouseenter', e => {
        const src = p.url && p.url.includes('youtube') ? '▶ YouTube' : 'Telegram';
        showTip(e, p.title || t.label, p.date || '', `${t.label} · ${src}`);
      });
      el.addEventListener('mouseleave', hideTip);
      frag.appendChild(el);
    }
  }

  container.appendChild(frag);
}

fetch('../data/topics.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('waffle-loading').style.display = 'none';
    renderWaffle(data.topics);
  })
  .catch(err => {
    document.getElementById('waffle-loading').textContent = 'Помилка завантаження';
    console.error(err);
  });
</script>

<script src="../nav.js"></script>
</body>
</html>
