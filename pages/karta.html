<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта — Ігор Матрофайло</title>
<style>
  :root {
    --ivory:  #FAF9F5; --paper: #FFFFFF; --slate: #141413; --oat: #E3DACC;
    --clay:   #D97757; --clay-d: #B85C3E; --clay-l: #FDF0EB;
    --olive:  #788C5D; --olive-l: #EEF3E8;
    --blue:   #4A7CC7; --blue-l: #EEF3FC;
    --g100: #F0EEE6; --g200: #E6E3DA; --g300: #D1CFC5; --g500: #87867F; --g700: #3D3D3A;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--ivory); color: var(--slate); line-height: 1.55; min-height: 100vh; }

  .page-header { max-width: 1100px; margin: 0 auto; padding: 36px 52px 28px; border-bottom: 1.5px solid var(--oat); }
  .page-eyebrow { font-family: var(--mono); font-size: 11px; color: var(--clay); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .page-header h1 { font-family: var(--serif); font-size: clamp(28px, 4vw, 48px); font-weight: 500; line-height: 1.1; }
  .page-header p  { margin-top: 10px; font-size: 15px; color: var(--g500); max-width: 500px; }

  .content { max-width: 1100px; margin: 0 auto; padding: 36px 52px 60px; }

  .chart-section { background: var(--paper); border: 1.5px solid var(--g300); border-radius: 16px; overflow: hidden; }
  .chart-head { padding: 20px 24px 16px; border-bottom: 1.5px solid var(--g200); }
  .chart-head h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .chart-head p  { font-size: 12.5px; color: var(--g500); }
  .chart-body { padding: 24px; }

  #tooltip { position: fixed; background: var(--slate); color: white; padding: 8px 13px; border-radius: 8px; font-size: 12.5px; pointer-events: none; display: none; z-index: 1000; max-width: 280px; line-height: 1.4; }
  #tooltip strong { display: block; font-size: 13px; margin-bottom: 2px; }
  #tooltip span { color: #ccc; font-size: 11.5px; }

  .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--g500); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  #treemap-canvas { display: block; width: 100%; border-radius: 8px; cursor: default; }

  .loading { display: flex; align-items: center; justify-content: center; height: 200px; font-family: var(--mono); font-size: 13px; color: var(--g500); }

  footer { max-width: 1100px; margin: 0 auto; padding: 20px 52px 36px; border-top: 1.5px solid var(--g300); font-size: 12px; color: var(--g500); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  footer a { color: var(--clay); text-decoration: none; }

  @media (max-width: 768px) {
    .page-header, .content, footer { padding-left: 20px; padding-right: 20px; }
    .page-header { padding-top: 24px; }
    .chart-body { padding: 16px; }
  }
</style>
</head>
<body>

<div id="tooltip"><strong id="tt-name"></strong><span id="tt-count"></span></div>

<header class="page-header">
  <div class="page-eyebrow">Карта</div>
  <h1>Теплова карта тем</h1>
  <p>Площа прямокутника = кількість матеріалів. Наведи для деталей.</p>
</header>

<main class="content">
  <section class="chart-section">
    <div class="chart-head">
      <h2>Treemap</h2>
      <p>Порівняй масштаб тем і компаній за кількістю постів та відео.</p>
    </div>
    <div class="chart-body">
      <canvas id="treemap-canvas"></canvas>
      <div class="loading" id="treemap-loading">Завантаження…</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--clay)"></div>Компанії</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--olive)"></div>Теми</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Продукти</div>
      </div>
    </div>
  </section>
</main>

<footer>
  <span>Ігор Матрофайло · <a href="https://t.me/imatrofAI" target="_blank">@imatrofAI</a></span>
  <span>Дані: 2024–2026</span>
</footer>

<script>
'use strict';

const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttCount = document.getElementById('tt-count');

function showTip(e, name, count) {
  tooltip.style.display = 'block';
  tooltip.style.left    = (e.clientX + 14) + 'px';
  tooltip.style.top     = (e.clientY - 10) + 'px';
  ttName.textContent    = name;
  ttCount.textContent   = count;
}
function hideTip() { tooltip.style.display = 'none'; }

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function layoutBinary(items, x, y, w, h) {
  if (!items.length) return [];
  if (items.length === 1) return [{ ...items[0], x, y, w, h }];

  const total = items.reduce((s, it) => s + it.value, 0);
  let cumsum = 0, splitIdx = 1;
  for (let i = 0; i < items.length - 1; i++) {
    const prev = cumsum;
    cumsum += items[i].value;
    if (cumsum >= total / 2) {
      splitIdx = (Math.abs(prev - total/2) < Math.abs(cumsum - total/2) && i > 0) ? i : i + 1;
      break;
    }
    splitIdx = i + 1;
  }

  const left  = items.slice(0, splitIdx);
  const right = items.slice(splitIdx);
  if (!left.length || !right.length) return [{ ...items[0], x, y, w, h }];

  const lf = left.reduce((s, it) => s + it.value, 0) / total;

  if (w >= h) {
    const lw = w * lf;
    return [...layoutBinary(left, x, y, lw, h), ...layoutBinary(right, x + lw, y, w - lw, h)];
  } else {
    const lh = h * lf;
    return [...layoutBinary(left, x, y, w, lh), ...layoutBinary(right, x, y + lh, w, h - lh)];
  }
}

function renderTreemap(topics) {
  const canvas = document.getElementById('treemap-canvas');
  const dpr    = window.devicePixelRatio || 1;
  const W      = canvas.parentElement.clientWidth;
  const H      = Math.min(Math.max(W * 0.52, 320), 520);

  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const items = [...topics]
    .sort((a, b) => b.count - a.count)
    .map(t => ({ id: t.id, label: t.label, value: t.count, color: t.color }));

  const rects = layoutBinary(items, 0, 0, W, H);
  const PAD   = 1.5;

  for (const r of rects) {
    const rw = r.w - PAD * 2, rh = r.h - PAD * 2;
    if (rw < 1 || rh < 1) continue;

    ctx.fillStyle = hexAlpha(r.color, 0.15);
    ctx.fillRect(r.x + PAD, r.y + PAD, rw, rh);
    ctx.strokeStyle = hexAlpha(r.color, 0.45);
    ctx.lineWidth   = 1;
    ctx.strokeRect(r.x + PAD, r.y + PAD, rw, rh);

    if (rw > 36 && rh > 22) {
      const fs = Math.min(13, Math.max(9, Math.min(rw * 0.12, rh * 0.22)));
      ctx.save();
      ctx.beginPath();
      ctx.rect(r.x + PAD + 3, r.y + PAD + 3, rw - 6, rh - 6);
      ctx.clip();
      ctx.fillStyle    = r.color;
      ctx.font         = `600 ${fs}px system-ui,sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const cy = rh > 36 ? r.y + r.h/2 - 7 : r.y + r.h/2;
      ctx.fillText(r.label, r.x + r.w/2, cy);
      if (rh > 34) {
        ctx.font      = `${Math.max(8, fs - 2.5)}px var(--mono,monospace)`;
        ctx.fillStyle = hexAlpha(r.color, 0.6);
        ctx.fillText(r.value, r.x + r.w/2, r.y + r.h/2 + fs * 0.85);
      }
      ctx.restore();
    }
  }

  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const hit = rects.find(r => mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h);
    canvas.style.cursor = hit ? 'pointer' : 'default';
    if (hit) showTip(e, hit.label, `${hit.value} матеріалів`);
    else hideTip();
  };
  canvas.onmouseleave = hideTip;
  canvas._rects = rects;
}

fetch('../data/topics.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('treemap-loading').style.display = 'none';
    renderTreemap(data.topics);
  })
  .catch(err => {
    document.getElementById('treemap-loading').textContent = 'Помилка завантаження';
    console.error(err);
  });

window.addEventListener('resize', () => {
  const canvas = document.getElementById('treemap-canvas');
  if (canvas._rects) {
    fetch('../data/topics.json').then(r=>r.json()).then(d => renderTreemap(d.topics));
  }
});
</script>

<script src="../nav.js"></script>
</body>
</html>
