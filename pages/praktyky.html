<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Практики — Ігор Матрофайло</title>
<link rel="stylesheet" href="/style.css">
<style>
  :root {
    /* viz palette */
    --vr: #C4614A; --vs: #7A8C62; --vd: #3A3A3A; --vm: #C5BAB0; --vl: #E8DFD8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--ivory); color: var(--slate); line-height: 1.55; min-height: 100vh; }

  /* ── Header ── */
  .page-header { max-width: 1100px; margin: 0 auto; padding: 36px 52px 28px; border-bottom: 1.5px solid var(--oat); display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; }
  .page-eyebrow { font-family: var(--mono); font-size: 11px; color: var(--clay); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .page-header h1 { font-family: var(--serif); font-size: clamp(28px, 4vw, 48px); font-weight: 500; line-height: 1.1; }
  .page-header p { margin-top: 10px; font-size: 15px; color: var(--g500); max-width: 480px; }
  .header-stat { background: var(--paper); border: 1.5px solid var(--g300); border-radius: 12px; padding: 10px 18px; text-align: right; }
  .stat-num { font-family: var(--serif); font-size: 28px; font-weight: 500; color: var(--slate); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--g500); margin-top: 3px; font-family: var(--mono); }

  /* ── Content ── */
  .content { max-width: 1100px; margin: 0 auto; padding: 48px 52px 72px; }

  /* ── Practice sections ── */
  .practice-section { margin-bottom: 56px; }
  .practice-section:last-child { margin-bottom: 0; }

  .section-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1.5px solid var(--g200); }
  .section-header h2 { font-family: var(--serif); font-size: 26px; font-weight: 500; color: var(--slate); margin-bottom: 6px; }
  .section-header p { font-size: 14px; color: var(--g500); max-width: 560px; }

  /* ── Cards grid ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }

  .card {
    background: var(--paper); border: 1.5px solid var(--g300); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: border-color 0.15s, box-shadow 0.15s;
    text-decoration: none; color: var(--slate);
  }
  .card:hover { border-color: var(--clay); box-shadow: 0 4px 20px rgba(196,97,74,0.10); }

  /* ── Viz area ── */
  .card-viz {
    height: 140px; background: var(--g100); display: flex; align-items: center;
    justify-content: center; padding: 0; overflow: hidden;
  }
  .card-viz svg { width: 100%; height: 100%; display: block; }

  /* ── Card body ── */
  .card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .card-segment {
    display: inline-flex; align-items: center;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px;
    border-radius: 4px; align-self: flex-start;
  }
  .seg-agents  { background: var(--clay-l);  color: var(--clay-d); }
  .seg-coding  { background: var(--blue-l);  color: #1E40AF; }
  .seg-tools   { background: var(--olive-l); color: #3D5A2A; }
  .seg-teams   { background: #F3F0FF;        color: #5B21B6; }

  .card-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--slate); }
  .card-summary { font-size: 13px; color: var(--g500); line-height: 1.6; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 1px solid var(--g100); margin-top: 2px; }
  .card-date { font-family: var(--mono); font-size: 10.5px; color: var(--g500); }
  .card-link { font-size: 11.5px; color: var(--clay); font-weight: 600; }

  /* ── Loading ── */
  .loading { display: flex; align-items: center; justify-content: center; height: 200px;
    font-family: var(--mono); font-size: 13px; color: var(--g500); }

  /* ── Footer ── */
  footer { max-width: 1100px; margin: 0 auto; padding: 20px 52px 36px;
    border-top: 1.5px solid var(--g300); font-size: 12px; color: var(--g500);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  footer a { color: var(--clay); text-decoration: none; }

  @media (max-width: 768px) {
    .page-header { grid-template-columns: 1fr; padding: 24px 20px 20px; }
    .content, footer { padding-left: 20px; padding-right: 20px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div>
    <div class="page-eyebrow">Практики</div>
    <h1>Взяв і зробив</h1>
    <p>Відібрані вручну how-to пости: промпти, пайплайни і підходи які можна застосувати сьогодні.</p>
  </div>
  <div class="header-stat">
    <div class="stat-num" id="stat-total">—</div>
    <div class="stat-label">практик</div>
  </div>
</header>

<main class="content">
  <div class="loading" id="loading">Завантаження…</div>
  <div id="sections"></div>
</main>

<footer>
  <span>Ігор Матрофайло · <a href="https://t.me/imatrofAI" target="_blank">@imatrofAI</a></span>
  <span>Відібрано вручну · 2025–2026</span>
</footer>

<script src="../nav.js" defer></script>
<script>
'use strict';

/* ── Viz palette (matches --v* CSS vars) ── */
const VR = '#C4614A'; // brick red
const VS = '#7A8C62'; // sage green
const VD = '#3A3A3A'; // dark
const VM = '#C5BAB0'; // warm mid gray
const VL = '#E8DFD8'; // light warm

/* ── SVG renderers — pure geometry, no text ── */

function renderLadder(viz) {
  const levels = [...viz.levels].sort((a, b) => a.n - b.n); // level 0 at bottom
  const n = levels.length;
  const barH = 13, gap = 6;
  const maxW = 200, minW = 56;
  const totalH = n * (barH + gap) - gap;
  const offsetY = Math.round((110 - totalH) / 2);

  const bars = levels.map((lv, i) => {
    const w = Math.round(minW + (maxW - minW) * (lv.n / (n - 1)));
    const y = offsetY + (n - 1 - i) * (barH + gap);
    const fill = lv.active ? VR : VM;
    const dot = lv.active
      ? `<circle cx="${20 + w + 8}" cy="${y + barH / 2}" r="3" fill="${VR}"/>`
      : '';
    return `<rect x="20" y="${y}" width="${w}" height="${barH}" rx="3" fill="${fill}"/>${dot}`;
  }).join('');

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

function renderStack(viz) {
  const layers = viz.layers;
  const n = layers.length;
  const colors = [VR, VS, VD, VM];
  const barH = 20, gap = 5;
  const maxW = 210;
  const indent = 14;
  const totalH = n * (barH + gap) - gap;
  const offsetY = Math.round((110 - totalH) / 2);

  const rects = layers.map((_, i) => {
    const w = maxW - i * indent;
    const x = 25 + Math.round(i * indent / 2);
    const y = offsetY + i * (barH + gap);
    const fill = colors[i % colors.length];
    return `<rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="4" fill="${fill}"/>`;
  }).join('');

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
}

function renderFlow(viz) {
  const steps = viz.steps;
  const n = steps.length;
  const boxW = n <= 3 ? 48 : n === 4 ? 40 : 34;
  const boxH = 30;
  const arrowGap = n <= 3 ? 18 : 14;
  const totalW = n * boxW + (n - 1) * arrowGap;
  const startX = Math.round((260 - totalW) / 2);
  const y = Math.round((110 - boxH) / 2);

  const items = steps.map((_, i) => {
    const x = startX + i * (boxW + arrowGap);
    const fill = i === n - 1 ? VR : VD;
    const box = `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="5" fill="${fill}"/>`;

    if (i < n - 1) {
      const ax1 = x + boxW + 2;
      const ax2 = x + boxW + arrowGap - 2;
      const ay = y + boxH / 2;
      const arrow = `
        <line x1="${ax1}" y1="${ay}" x2="${ax2 - 4}" y2="${ay}" stroke="${VM}" stroke-width="1.5"/>
        <polygon points="${ax2 - 4},${ay - 3} ${ax2},${ay} ${ax2 - 4},${ay + 3}" fill="${VM}"/>`;
      return box + arrow;
    }
    return box;
  }).join('');

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">${items}</svg>`;
}

function renderCouncil(viz) {
  const bW = 52, bH = 26, gapX = 12, gapY = 10;
  const gridW = 2 * bW + gapX;
  const gx = Math.round((260 - gridW) / 2);
  const gy = 12;

  const positions = [
    [gx, gy],
    [gx + bW + gapX, gy],
    [gx, gy + bH + gapY],
    [gx + bW + gapX, gy + bH + gapY],
  ];

  const models = (viz.models || []).slice(0, 4);
  const chairW = 80, chairH = 26;
  const chairX = Math.round((260 - chairW) / 2);
  const chairY = 78;

  const connCX = gx + gridW / 2;
  const connCY = chairY;

  const lines = positions.slice(0, models.length).map(([px, py]) => {
    const mx = px + bW / 2;
    const my = py + bH;
    return `<line x1="${mx}" y1="${my}" x2="${connCX}" y2="${connCY}" stroke="${VL}" stroke-width="1.5"/>`;
  }).join('');

  const boxes = positions.slice(0, models.length).map(([px, py]) =>
    `<rect x="${px}" y="${py}" width="${bW}" height="${bH}" rx="4" fill="${VD}"/>`
  ).join('');

  const chair = `<rect x="${chairX}" y="${chairY}" width="${chairW}" height="${chairH}" rx="5" fill="${VR}"/>`;

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    ${lines}${boxes}${chair}
  </svg>`;
}

function renderSteps(viz) {
  const n = (viz.items || []).length;
  const maxH = 68, barW = n <= 4 ? 36 : 28, gap = 10;
  const totalW = n * barW + (n - 1) * gap;
  const startX = Math.round((260 - totalW) / 2);
  const baseY = 95;

  const bars = viz.items.map((_, i) => {
    const frac = n === 1 ? 1 : i / (n - 1);
    const h = Math.round(18 + (maxH - 18) * frac);
    const x = startX + i * (barW + gap);
    const y = baseY - h;
    const fill = i === n - 1 ? VR : i === n - 2 ? VS : VD;
    const dot = `<circle cx="${x + barW / 2}" cy="${y - 6}" r="4" fill="${fill}"/>`;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="${fill}"/>${dot}`;
  }).join('');

  const baseline = `<line x1="16" y1="${baseY + 1}" x2="244" y2="${baseY + 1}" stroke="${VL}" stroke-width="1.5"/>`;

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    ${baseline}${bars}
  </svg>`;
}

function renderGauge(viz) {
  const pct = Math.min(1, Math.max(0.02, viz.value / 100));
  const cx = 130, cy = 92, r = 60, sw = 13;

  // Full upper semicircle: M (cx-r, cy) A r r 0 1 1 (cx+r, cy)
  const bgPath = `M ${cx - r} ${cy} A ${r} ${r} 0 1 1 ${cx + r} ${cy}`;

  // Fill arc: from leftmost point, clockwise (sweep=1) for pct * 180°
  const endAngle = (1 - pct) * Math.PI;
  const endX = (cx + r * Math.cos(endAngle)).toFixed(1);
  const endY = (cy - r * Math.sin(endAngle)).toFixed(1);
  const largeArc = pct > 0.5 ? 1 : 0;
  const fillPath = `M ${cx - r} ${cy} A ${r} ${r} 0 ${largeArc} 1 ${endX} ${endY}`;

  // End dot
  const dotR = 5;
  const dotPath = `<circle cx="${endX}" cy="${endY}" r="${dotR}" fill="${VR}"/>`;

  // Start dot
  const startDot = `<circle cx="${cx - r}" cy="${cy}" r="${dotR}" fill="${VL}"/>`;

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="${bgPath}" stroke="${VL}" stroke-width="${sw}" stroke-linecap="round" fill="none"/>
    <path d="${fillPath}" stroke="${VR}" stroke-width="${sw}" stroke-linecap="round" fill="none"/>
    ${startDot}${dotPath}
  </svg>`;
}

function renderCompare(viz) {
  const pW = 96, pH = 76, pY = 17;
  const gap = 20;
  const totalW = 2 * pW + gap;
  const startX = Math.round((260 - totalW) / 2);
  const bX = startX, aX = startX + pW + gap;

  // Before panel (dashes = old/fragmented)
  const beforeRect = `<rect x="${bX}" y="${pY}" width="${pW}" height="${pH}" rx="6" fill="${VL}"/>`;
  const dashes = [34, 48, 62, 76].map(y =>
    `<line x1="${bX + 10}" y1="${y}" x2="${bX + pW - 10}" y2="${y}" stroke="${VM}" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5"/>`
  ).join('');

  // After panel (solid blocks = clean/new)
  const afterRect = `<rect x="${aX}" y="${pY}" width="${pW}" height="${pH}" rx="6" fill="${VR}" opacity="0.12" stroke="${VR}" stroke-width="1.5" stroke-opacity="0.5"/>`;
  const blocks = [31, 44, 57, 70].map((y, i) => {
    const w = i % 2 === 0 ? pW - 18 : pW - 32;
    return `<rect x="${aX + 9}" y="${y}" width="${w}" height="9" rx="2.5" fill="${VR}"/>`;
  }).join('');

  // Arrow connector
  const arrowCX = startX + pW + Math.round(gap / 2);
  const arrowCY = pY + Math.round(pH / 2);
  const arrow = `
    <line x1="${arrowCX - 6}" y1="${arrowCY}" x2="${arrowCX + 2}" y2="${arrowCY}" stroke="${VD}" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="${arrowCX + 2},${arrowCY - 3.5} ${arrowCX + 8},${arrowCY} ${arrowCX + 2},${arrowCY + 3.5}" fill="${VD}"/>`;

  return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    ${beforeRect}${dashes}${afterRect}${blocks}${arrow}
  </svg>`;
}

/* ── Viz dispatcher ── */
function renderViz(viz) {
  if (!viz) return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>`;
  switch (viz.type) {
    case 'ladder':  return renderLadder(viz);
    case 'stack':   return renderStack(viz);
    case 'flow':    return renderFlow(viz);
    case 'council': return renderCouncil(viz);
    case 'steps':   return renderSteps(viz);
    case 'gauge':   return renderGauge(viz);
    case 'compare': return renderCompare(viz);
    default:        return `<svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>`;
  }
}

/* ── Section config ── */
const SECTIONS = [
  {
    seg: 'agents',
    title: 'Агенти',
    desc: 'Архітектура та протоколи для AI-агентів — пайплайни, оркестрація, MCP.',
    cls: 'seg-agents',
  },
  {
    seg: 'coding',
    title: 'Кодинг',
    desc: 'Практики для розробників: ефективні промпти, автономні агенти, нові інструменти.',
    cls: 'seg-coding',
  },
  {
    seg: 'tools',
    title: 'Інструменти',
    desc: 'Конкретні налаштування і прийоми, що змінюють щоденну роботу з AI.',
    cls: 'seg-tools',
  },
  {
    seg: 'teams',
    title: 'Команди',
    desc: 'Як впроваджувати AI в командні процеси та вимірювати реальний приріст.',
    cls: 'seg-teams',
  },
];

const SEG_LABELS = {
  agents: 'Агенти',
  coding: 'Кодинг',
  tools: 'Інструменти',
  teams: 'Команди',
};

/* ── Render card ── */
function buildCard(card, segCls) {
  const date = card.date ? new Date(card.date).toLocaleDateString('uk', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
  return `
    <a class="card" href="${card.url}" target="_blank" rel="noopener">
      <div class="card-viz">${renderViz(card.viz)}</div>
      <div class="card-body">
        <span class="card-segment ${segCls}">${SEG_LABELS[card.segment] || card.segment}</span>
        <div class="card-title">${card.title}</div>
        <div class="card-summary">${card.summary}</div>
        <div class="card-footer">
          <span class="card-date">${date}</span>
          <span class="card-link">Читати →</span>
        </div>
      </div>
    </a>`;
}

/* ── Main ── */
fetch('../data/cards.json')
  .then(r => r.json())
  .then(data => {
    const cards = data.cards || [];
    document.getElementById('stat-total').textContent = cards.length;
    document.getElementById('loading').style.display = 'none';

    // Group cards by segment
    const bySegment = {};
    cards.forEach(c => {
      if (!bySegment[c.segment]) bySegment[c.segment] = [];
      bySegment[c.segment].push(c);
    });

    const sectionsEl = document.getElementById('sections');
    SECTIONS.forEach(sec => {
      const segCards = bySegment[sec.seg] || [];
      if (!segCards.length) return;

      const cardsHtml = segCards.map(c => buildCard(c, sec.cls)).join('');
      sectionsEl.insertAdjacentHTML('beforeend', `
        <section class="practice-section">
          <div class="section-header">
            <h2>${sec.title}</h2>
            <p>${sec.desc}</p>
          </div>
          <div class="cards-grid">${cardsHtml}</div>
        </section>`);
    });
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'Помилка завантаження';
  });
</script>
</body>
</html>
